<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agris | Monitoramento</title>
<link rel="stylesheet" href="css/monitoramento.css">

</head>
<body>

<nav>
<ul class="menu">
    <li><a href="#">Início</a></li>
    <li><a href="#">Monitoramento</a></li>
    <li><a href="#">Recomendações</a></li>
    <li><a href="#">Fale Conosco</a></li>
</ul>
</nav>
   <article class="titulo">
    <h1>Clique no mapa</h1>
    <p>Para descobrir o local ideal para seu plantio</p>
   </article>
   <div class="wrapper">
    <div class="mapa">
           <img src="./assets/mapa.jpeg" alt="mapa">
     </div>
     <div class="container">
        <div class="card">
             <h2 id="estadoSelecionado">
            Selecione um estado
        </h2>
        <table>
            <tr>
                <td>Fertilidade</td>
                <td id="fertilidade"><strong>Alta</strong></td>
            </tr>
            <tr>
                <td>pH do Solo</td>
                <td id="ph"><strong>6.2</strong></td>
            </tr>
            <tr>
                <td>Nitrogênio</td>
                <td id="nitrogenio"><strong>86%</strong></td>
            </tr>
            <tr>
                <td>Água Disponível</td>
                <td id="agua"><strong>78%</strong></td>
            </tr>
        </table>
        </div>
        <div class="historico" 
                <div class="historico-header">
                    <h2>Histórico de precipitação</h2>
                    <div class="filtro">
                        <label for="periodo">Período</label>
                        <select name="periodo" id="periodo">

                            <option value="qualquer-uma">qualquer</option>
                            <option value="ultimo-ano">Último ano</option>
                            <option value="6-meses">Últimos 6 meses</option>
                            <option value="30-dias">Últimos 30 dias</option>
                        </select>

                        
                    </div>
                      </div>
                      <div id="conteudo-historico"></div>
    </div>
        
<script src="./js/monitoramento.js"></script>

</body>
</html>

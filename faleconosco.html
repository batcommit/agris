    <!-- =========================================================

    <section id="Contato">

        <div class="section-top fade-in">

            <p class="slide-right">

                Dê o próximo passo no mercado rural com a Agris.

                    <h3>Email</h3>

                    <p>agris.comercial@gmail.com</p>

                </div>

                <input type="text" placeholder="Seu nome" required class="fade-in">

                <input type="email" placeholder="Seu email" required class="fade-in">

                <input type="tel" placeholder="Seu telefone" required class="fade-in">

                <textarea placeholder="Digite sua mensagem" class="fade-in"></textarea>

                    Enviar Mensagem

                </button>
